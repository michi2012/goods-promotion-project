route:
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack-notifications'

receivers:
- name: 'slack-notifications'
  slack_configs:
  - api_url: 'https://hooks.slack.com/services/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'
    channel: '#elice-sre' 
    send_resolved: true
    title: '[{{ .Status | toUpper }}] 굿즈 한정 판매 서비스 SRE 알림'
    # 1. 메시지 본문 설정
    text: >-
      {{ range .Alerts }}
        *알람명:* {{ .Labels.alertname }}
        *서버:* {{ .Labels.instance }}
        *심각도:* {{ .Labels.severity }}
        *내용:* {{ .Annotations.description }}
        *발생시간:* {{ .StartsAt.Format "2006-01-02 15:04:05" }} (UTC)
      {{ end }}
    # 2. 버튼(Action) 설정 추가
    actions:
    - type: button
      text: '📖 Runbook'
      url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
    - type: button
      text: '📊 Dashboard'
      url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
    - type: button
      text: '🔍 Logs'
      url: '{{ (index .Alerts 0).Annotations.log_query_url }}'