apiVersion: 1

providers:
  - name: 'Promotion SRE Dashboards'
    orgId: 1
    folder: 'SRE Project'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    options:
      # 컨테이너 내부의 경로입니다. docker-compose의 volumes 설정과 일치해야 합니다.
      path: /var/lib/grafana/dashboards