eureka:
  client:
    register-with-eureka: true
    fetch-registry: false
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"

spring:
  application:
    name: codebot
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
  ai:
    google:
      genai:
        api-key: ${AI_API_KEY}
        chat:
          options:
            model: gemini-3.1-flash-lite

server:
  port: 8087

observability:
  loki:
    url: "${LOKI_URL:http://loki:3100}"
  tempo:
    url: "${TEMPO_URL:http://tempo:3200}"
  prometheus:
    url: "${PROMETHEUS_URL:http://prometheus:9090}"

github:
  owner: ${GITHUB_OWNER:michi2012}
  repo: ${GITHUB_REPO:goods-promotion-project}
  token: ${GITHUB_TOKEN:}

linear:
  api-key: ${LINEAR_API_KEY:}
  team-id: ${LINEAR_TEAM_ID:}

k8s:
  namespace: ${K8S_NAMESPACE:promotion}

management:
  observations:
    enable:
      http:
        server:
          requests:
            "[uri=/actuator/**]": false
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true
  tracing:
    sampling:
      probability: 0.01
  otlp:
    tracing:
      endpoint: "${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}"

logging:
  level:
    root: WARN
    codebot.codebot: INFO
