eureka:
  client:
    register-with-eureka: true
    fetch-registry: false
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"

spring:
  application:
    name: codebot
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
  ai:
    google:
      genai:
        api-key: ${AI_API_KEY}
        chat:
          options:
            model: gemini-3.1-flash-lite

server:
  port: 8087

observability:
  loki:
    url: "${LOKI_URL:http://loki:3100}"
  tempo:
    url: "${TEMPO_URL:http://tempo:3200}"
  prometheus:
    url: "${PROMETHEUS_URL:http://prometheus:9090}"
  pyroscope:
    url: "${PYROSCOPE_URL:http://pyroscope:4040}"

github:
  owner: ${GITHUB_OWNER:michi2012}
  repo: ${GITHUB_REPO:goods-promotion-project}
  token: ${GITHUB_TOKEN:}

linear:
  api-key: ${LINEAR_API_KEY:}
  team-id: ${LINEAR_TEAM_ID:}

k8s:
  namespace: ${K8S_NAMESPACE:promotion}

codebot:
  repo:
    local-path: ${CODEBOT_REPO_PATH:/repo/current}

data-query:
  datasource:
    order:
      url: "${CODEBOT_ORDER_DB_URL:jdbc:mysql://mysql:3306/order?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true}"
      username: ${CODEBOT_ORDER_DB_USERNAME:codebot_ro}
      password: ${CODEBOT_ORDER_DB_PASSWORD:}
    payment:
      url: "${CODEBOT_PAYMENT_DB_URL:jdbc:mysql://mysql-c:3306/payment?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true}"
      username: ${CODEBOT_PAYMENT_DB_USERNAME:codebot_ro}
      password: ${CODEBOT_PAYMENT_DB_PASSWORD:}
    user:
      url: "${CODEBOT_USER_DB_URL:jdbc:mysql://mysql-user:3306/user?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true}"
      username: ${CODEBOT_USER_DB_USERNAME:codebot_ro}
      password: ${CODEBOT_USER_DB_PASSWORD:}

management:
  observations:
    enable:
      http:
        server:
          requests:
            "[uri=/actuator/**]": false
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true
  tracing:
    sampling:
      probability: 0.01
  otlp:
    tracing:
      endpoint: "${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}"

logging:
  level:
    root: WARN
    codebot.codebot: INFO
