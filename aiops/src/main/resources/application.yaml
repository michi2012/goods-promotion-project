eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"

spring:
  application:
    name: aiops
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
  ai:
    google:
      genai:
        api-key: ${AI_API_KEY}
        chat:
          options:
            model: gemini-3.1-flash-lite

server:
  port: 8085

observability:
  loki:
    url: "${LOKI_URL:http://loki:3100}"
  tempo:
    url: "${TEMPO_URL:http://tempo:3200}"
  prometheus:
    url: "${PROMETHEUS_URL:http://prometheus:9090}"
  pyroscope:
    url: "${PYROSCOPE_URL:http://pyroscope:4040}"
  kafka-connect:
    url: "${KAFKA_CONNECT_URL:http://kafka-connect:8083}"

github:
  owner: ${GITHUB_OWNER:michi2012}
  repo: ${GITHUB_REPO:goods-promotion-project}

linear:
  api-key: ${LINEAR_API_KEY:}
  team-id: ${LINEAR_TEAM_ID:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL}
  bot-token: ${SLACK_BOT_TOKEN:}

k8s:
  namespace: ${K8S_NAMESPACE:promotion}

canary:
  rollout:
    interval-ms: ${CANARY_ROLLOUT_INTERVAL_MS:300000}
    services: ${CANARY_ROLLOUT_SERVICES:server-a,server-b,server-c}
    steps: ${CANARY_ROLLOUT_STEPS:10,25,50,100}
    healthy-checks-required: ${CANARY_ROLLOUT_HEALTHY_CHECKS_REQUIRED:2}
    max-error-rate-percent: ${CANARY_ROLLOUT_MAX_ERROR_RATE_PERCENT:5.0}
    min-request-rate: ${CANARY_ROLLOUT_MIN_REQUEST_RATE:0.05}

management:
  observations:
    enable:
      http:
        server:
          requests:
            "[uri=/actuator/**]": false
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true
  tracing:
    sampling:
      probability: 0.01
  otlp:
    tracing:
      endpoint: "${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}"

logging:
  level:
    root: WARN
    aiops.aiops: INFO
