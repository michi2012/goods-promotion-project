services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"
      - "4317:4317"
    networks:
      - monitoring-network
    depends_on:
      - tempo
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - ./monitoring/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--enable-feature=exemplar-storage'
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: alertmanager
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9093:9093"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    volumes:
      - ./monitoring/vector/vector.yaml:/etc/vector/vector.yaml
    ports:
      - "9000:9000"
    networks:
      - monitoring-network
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # app EC2 IP로 변경 필요 (REDIS_ADDR: redis://<app-a-ip>:6379)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # app EC2 IP로 변경 필요 (REDIS_ADDR: redis://<app-b-ip>:6380)
  redis-b-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-b-exporter
    environment:
      REDIS_ADDR: redis://redis-b:6379
    ports:
      - "9122:9121"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # infra EC2 IP로 변경 필요 (--kafka.server=<infra-ip>:9092)
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  mysql-a-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-a-exporter
    command:
      - --config.my-cnf=/etc/mysql/my.cnf
    volumes:
      - ./monitoring/mysql/mysql-a.cnf:/etc/mysql/my.cnf:ro
    ports:
      - "9104:9104"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  mysql-c-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-c-exporter
    command:
      - --config.my-cnf=/etc/mysql/my.cnf
    volumes:
      - ./monitoring/mysql/mysql-c.cnf:/etc/mysql/my.cnf:ro
    ports:
      - "9105:9104"
    networks:
      - monitoring-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  aiops:
    build:
      context: ./aiops
      dockerfile: Dockerfile
    container_name: aiops
    ports:
      - "8085:8085"
    networks:
      - monitoring-network
    environment:
      TZ: Asia/Seoul
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - alertmanager
      - prometheus
      - loki
      - tempo
      - otel-collector
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  monitoring-network:
    name: monitoring-network
    driver: bridge
