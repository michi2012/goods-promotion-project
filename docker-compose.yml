services:
  # 1. MySQL
  mysql:
    image: mysql:8.0
    container_name: promotion-mysql
    ports:
      - "3307:3306"
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: promotion
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --server-id=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 1-b. MySQL (serverC 전용)
  mysql-c:
    image: mysql:8.0
    container_name: promotion-mysql-c
    ports:
      - "3308:3306"
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --server-id=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 2. Redis (serverA 전용)
  redis:
    image: redis:7.0-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    container_name: promotion-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 2-b. Redis (serverB 전용)
  redis-b:
    image: redis:7.0-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    container_name: promotion-redis-b
    ports:
      - "6380:6379"
    environment:
      TZ: Asia/Seoul
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 3. Kafka
  kafka:
    image: bitnami/kafka:latest
    container_name: promotion-kafka
    ports:
      - "9092:9092"
    environment:
      TZ: Asia/Seoul
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  # 3-b. Kafka Connect (Debezium CDC)
  kafka-connect:
    image: quay.io/debezium/connect:2.7
    container_name: promotion-kafka-connect
    ports:
      - "8083:8083"
    environment:
      TZ: Asia/Seoul
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mysql-c:
        condition: service_healthy
    networks:
      - promotion-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 3-c. Debezium 커넥터 자동 등록
  debezium-init:
    image: curlimages/curl:latest
    container_name: promotion-debezium-init
    entrypoint:
      - /bin/sh
      - -c
      - "curl -f -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/debezium/outbox-connector.json && curl -f -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/debezium/payment-outbox-connector.json"
    volumes:
      - ./debezium:/debezium
    depends_on:
      kafka-connect:
        condition: service_healthy
      mysql-c:
        condition: service_healthy
    networks:
      - promotion-network
    restart: on-failure

  # 4. Discovery Service (Eureka Server)
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: promotion-discovery
    volumes:
      - shared-logs:/logs
    ports:
      - "8761:8761"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    networks:
      - promotion-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # 5. SERVER C (최종 저장)
  server-c:
    build:
      context: ./serverC
      dockerfile: Dockerfile
    container_name: promotion-server-c
    volumes:
      - shared-logs:/logs
    ports:
      - "8082:8082"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-c:3306/payment?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&characterEncoding=UTF-8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      mysql-c:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - promotion-network
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 5. SERVER B (파이프라인)
  server-b:
    build:
      context: ./serverB
      dockerfile: Dockerfile
    container_name: promotion-server-b
    volumes:
      - shared-logs:/logs
    ports:
      - "8081:8081"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATA_REDIS_HOST: redis-b
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXTERNAL_SERVER_A_URL: http://server-a:8080
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      redis-b:
        condition: service_started
      server-c:
        condition: service_started
      kafka:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - promotion-network
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # 6. SERVER A (동시성 제어 입구)
  server-a:
    build:
      context: ./serverA
      dockerfile: Dockerfile
    container_name: promotion-server-a
    volumes:
      - shared-logs:/logs
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/promotion?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&characterEncoding=UTF-8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      server-b:
        condition: service_started
      discovery-service:
        condition: service_healthy
    networks:
      - promotion-network
    restart: on-failure
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Gateway Service
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: promotion-gateway
    volumes:
      - shared-logs:/logs
    ports:
      - "8088:8088"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - promotion-network
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # -----------------------------------------------------
  # SRE & Observability Stack
  # -----------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - promotion-network
    depends_on:
      - tempo
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - ./monitoring/prometheus/recording-rules.yml:/etc/prometheus/recording-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--enable-feature=exemplar-storage'
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    networks:
      - promotion-network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: alertmanager
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9093:9093"
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
    restart: unless-stopped
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    volumes:
      - ./monitoring/vector/vector.yaml:/etc/vector/vector.yaml
      - shared-logs:/logs
    ports:
      - "9000:9000"
    networks:
      - promotion-network
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - promotion-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  redis-b-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-b-exporter
    environment:
      REDIS_ADDR: redis://redis-b:6379
    ports:
      - "9122:9121"
    networks:
      - promotion-network
    depends_on:
      - redis-b
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    networks:
      - promotion-network
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  mysql-a-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-a-exporter
    command:
      - --config.my-cnf=/etc/mysql/my.cnf
    volumes:
      - ./monitoring/mysql/mysql-a.cnf:/etc/mysql/my.cnf:ro
    ports:
      - "9104:9104"
    networks:
      - promotion-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  mysql-c-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-c-exporter
    command:
      - --config.my-cnf=/etc/mysql/my.cnf
    volumes:
      - ./monitoring/mysql/mysql-c.cnf:/etc/mysql/my.cnf:ro
    ports:
      - "9105:9104"
    networks:
      - promotion-network
    depends_on:
      mysql-c:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # cAdvisor — 컨테이너 CPU/메모리 수집
  # Windows Docker Desktop(WSL2)에서는 아래 volume 마운트가 WSL2 내부 경로를 가리켜
  # 메트릭이 비어 보일 수 있음. Linux 서버 배포 환경에서는 정상 동작.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - promotion-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "9080:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    networks:
      - promotion-network
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  aiops:
    build:
      context: ./aiops
      dockerfile: Dockerfile
    container_name: aiops
    volumes:
      - shared-logs:/logs
    ports:
      - "8085:8085"
    networks:
      - promotion-network
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: local
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      SPRING_AI_GOOGLE_GENAI_API_KEY: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      EUREKA_DEFAULT_ZONE: http://discovery-service:8761/eureka/
      OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - alertmanager
      - prometheus
      - loki
      - tempo
      - otel-collector
      - discovery-service
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  promotion-network:
    name: promotion-network
    driver: bridge

volumes:
  kafka-data:
  shared-logs: