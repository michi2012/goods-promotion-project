server:
  port: 8080

spring:
  main:
    # 빈 이름 충돌 방지 (RestTemplateConfig 중복 에러 해결)
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://localhost:3306/weverse_promo?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: worldcup7!

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false

# 스케줄러 비활성화 (테스트 데이터를 백그라운드 워커가 훔쳐가지 못하게 함)
scheduling:
  enabled: false

logging:
  level:
    root: info
    weverse.serverA: debug