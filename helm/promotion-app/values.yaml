# Istio нҠёлһҳн”Ҫ м •мұ… кё°ліёк°’
traffic:
  outlierDetection:
    consecutive5xxErrors: 5   # мқҙ нҡҹмҲҳл§ҢнҒј 5xx м—°мҶҚ л°ңмғқ мӢң нҢҢл“ңлҘј н’Җм—җм„ң м ңкұ°
    interval: 10s             # мІҙнҒ¬ мЈјкё°
    baseEjectionTime: 30s     # мІ« мқҙм қм…ҳ мң м§Җ мӢңк°„ (мқҙнӣ„ лҲ„м Ғ л°°мҲҳлЎң мҰқк°Җ)
    maxEjectionPercent: 50    # н’Җмқҳ мөңлҢҖ 50%к№Ңм§Җл§Ң м ңкұ° (м„ңл№„мҠӨ мҷ„м „ мӨ‘лӢЁ л°©м§Җ)

