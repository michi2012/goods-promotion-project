# promotion-app values.yaml
# лҜјк°җк°’(password, apiKey л“ұ)мқҖ helm upgrade --set мңјлЎң мЈјмһ…
# мҳҲ) helm upgrade promotion-app ./helm/promotion-app --set serverA.datasource.password=secret

namespace: promotion

imagePullPolicy: Always  # EKS: Always | лЎңм»¬ н…ҢмҠӨнҠё: IfNotPresent

ingress:
  host: ""             # --set ingress.host=yourdomain.com
  certificateArn: ""   # --set ingress.certificateArn=arn:aws:acm:ap-northeast-2:...
  wafAcl: ""           # AWS WAF: arn:aws:wafv2:ap-northeast-2:...
                       # Cloudflare мӮ¬мҡ© мӢң л№„мӣҢл‘ 

nodeSelector:
  role: app

discovery:
  name: discovery-service
  replicas: 1
  port: 8761
  image: ""
  springProfilesActive: "k8s"  # --set discovery.image=<ECR_URL>/discovery-service:tag
  otlpEndpoint: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

gateway:
  name: gateway-service
  replicas: 1
  port: 8088
  image: ""  # --set gateway.image=<ECR_URL>/gateway-service:tag
  springProfilesActive: "k8s"
  redis:
    host: ""   # --set gateway.redis.host=<ELASTICACHE_ENDPOINT>
    port: 6379
  corsAllowedOrigin: ""  # --set gateway.corsAllowedOrigin=https://yourdomain.com
  eurekaDefaultZone: "http://discovery-service:8761/eureka/"
  otlpEndpoint: ""
  profiler:
    enabled: true  # Pyroscope continuous profiling (Java agent, initContainerлЎң jar мЈјмһ…)
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60

serverA:
  name: server-a
  replicas: 2
  port: 8080
  image: ""  # --set serverA.image=<ECR_URL>/server-a:tag
  springProfilesActive: "k8s"
  datasource:
    url: ""       # --set serverA.datasource.url=jdbc:mysql://<RDS_ENDPOINT>:3306/order?...
    username: ""  # --set serverA.datasource.username=root
    password: ""  # --set serverA.datasource.password=<password>
  redis:
    host: ""      # --set serverA.redis.host=<ELASTICACHE_ENDPOINT>
    port: 6379
  kafka:
    bootstrapServers: "kafka-service:9092"
  eurekaDefaultZone: "http://discovery-service:8761/eureka/"
  otlpEndpoint: ""
  profiler:
    enabled: true  # Pyroscope continuous profiling нҢҢмқјлҹҝ (Java agent, initContainerлЎң jar мЈјмһ…)
  resources:
    requests:
      cpu: "200m"
      memory: "400Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
          - type: Pods
            value: 1
            periodSeconds: 60
  canary:
    enabled: false  # trueлЎң м„Өм •н•ҳл©ҙ v2 м№ҙлӮҳлҰ¬ Deployment(1к°ң) мғқм„ұ
    replicas: 1
    image: ""  # л№„м–ҙмһҲмңјл©ҙ serverA.imageмҷҖ лҸҷмқјн•ң мқҙлҜём§Җ мӮ¬мҡ©

