apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ .Values.csBot.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.csBot.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  host: {{ .Values.csBot.name }}
  trafficPolicy:
    outlierDetection:
      consecutive5xxErrors: {{ .Values.traffic.outlierDetection.consecutive5xxErrors }}
      interval: {{ .Values.traffic.outlierDetection.interval }}
      baseEjectionTime: {{ .Values.traffic.outlierDetection.baseEjectionTime }}
      maxEjectionPercent: {{ .Values.traffic.outlierDetection.maxEjectionPercent }}
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
