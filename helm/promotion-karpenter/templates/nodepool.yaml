apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  template:
    metadata:
      labels:
        role: app   # promotion-app 전체 서비스의 nodeSelector: role: app 과 매핑
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]   # Spot 우선 사용, 재고 부족 시 On-demand fallback
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "c"]              # 범용(m) / 컴퓨팅 최적화(c)
        - key: karpenter.k8s.aws/instance-generation
          operator: In
          values: ["4", "5", "6"]         # 4~6세대 (m5, m6i, c5, c6i 등)
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge"]
  limits:
    cpu: {{ .Values.nodePool.limits.cpu | quote }}
    memory: {{ .Values.nodePool.limits.memory | quote }}
  disruption:
    consolidationPolicy: WhenUnderutilized  # 유휴 노드 지속 평가 후 자동 반납 (consolidateAfter 없음 — v1 스펙)
