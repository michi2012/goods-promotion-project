---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.alertmanager.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  alertmanager.yml: |
{{ .Files.Get "files/alertmanager.yml" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.alertmanager.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.alertmanager.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "promotion-monitoring.chart" . }}
spec:
  replicas: {{ .Values.alertmanager.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.alertmanager.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.alertmanager.name }}
        app.kubernetes.io/name: {{ .Values.alertmanager.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Values.alertmanager.name }}
          image: {{ .Values.alertmanager.image }}
          imagePullPolicy: Always
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports:
            - containerPort: {{ .Values.alertmanager.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
          resources:
            requests:
              cpu: {{ .Values.alertmanager.resources.requests.cpu | quote }}
              memory: {{ .Values.alertmanager.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.alertmanager.resources.limits.cpu | quote }}
              memory: {{ .Values.alertmanager.resources.limits.memory | quote }}
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.alertmanager.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.alertmanager.name }}
  ports:
    - port: {{ .Values.alertmanager.port }}
      targetPort: {{ .Values.alertmanager.port }}
