---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.exporters.kafka.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.exporters.kafka.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "promotion-monitoring.chart" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.exporters.kafka.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.exporters.kafka.name }}
        app.kubernetes.io/name: {{ .Values.exporters.kafka.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Values.exporters.kafka.name }}
          image: {{ .Values.exporters.kafka.image }}
          imagePullPolicy: Always
          args: ["--kafka.server={{ .Values.exporters.kafka.server }}"]
          ports:
            - containerPort: {{ .Values.exporters.kafka.port }}
          resources:
            requests:
              cpu: {{ .Values.exporters.kafka.resources.requests.cpu | quote }}
              memory: {{ .Values.exporters.kafka.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.exporters.kafka.resources.limits.cpu | quote }}
              memory: {{ .Values.exporters.kafka.resources.limits.memory | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.exporters.kafka.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.exporters.kafka.name }}
  ports:
    - port: {{ .Values.exporters.kafka.port }}
      targetPort: {{ .Values.exporters.kafka.port }}
