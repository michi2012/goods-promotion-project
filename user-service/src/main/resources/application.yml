server:
  port: 8086
  shutdown: graceful
  tomcat:
    accept-count: 1000
    mbeanregistry:
      enabled: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: false
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3309/user?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&characterEncoding=UTF-8&useUnicode=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  jwt:
    issuer: user-service
    secret: ${JWT_SECRET:local-dev-jwt-secret-key-must-be-at-least-256-bits-for-hs256-algorithm}

cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"

logging:
  level:
    root: INFO

management:
  observations:
    enable:
      http:
        server:
          requests:
            "[uri=/actuator/**]": false
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true
  tracing:
    sampling:
      probability: 0.01
  otlp:
    tracing:
      endpoint: "${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}"
  health:
    circuitbreakers:
      enabled: true
