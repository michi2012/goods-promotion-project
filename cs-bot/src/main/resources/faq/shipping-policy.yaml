category: 배송정책
items:
  - question: 배송은 얼마나 걸리나요?
    answer: 결제 완료 후 평균 2~3일 내 출고되며, 출고 후 1~2일 내 수령 가능합니다.
  - question: 배송비는 얼마인가요?
    answer: 3만원 이상 구매 시 무료배송이며, 미만 구매 시 3,000원의 배송비가 부과됩니다.
  - question: 배송지를 변경할 수 있나요?
    answer: 출고 전 상태(결제 완료 상태)라면 마이페이지에서 배송지 변경이 가능합니다. 출고 이후에는 변경이 불가합니다.
  - question: 해외 배송도 가능한가요?
    answer: 현재는 국내 배송만 지원합니다.
