category: 구매규칙
items:
  - question: 한 사람당 몇 개까지 구매할 수 있나요?
    answer: 선착순 한정 상품은 1인 1개로 제한됩니다. 중복 계정으로 구매 시 모든 주문이 취소될 수 있습니다.
  - question: 같은 상품을 여러 번 결제했는데 어떻게 되나요?
    answer: 10분 이내 동일 상품 중복 결제는 시스템에서 자동 감지됩니다. 진단 도구로 확인 후 중복분에 대해 환불 요청을 할 수 있습니다.
  - question: 품절된 상품은 재입고되나요?
    answer: 선착순 한정 상품은 기본적으로 재입고되지 않습니다. 일부 상시 판매 상품만 재입고 일정이 안내됩니다.
  - question: 결제 수단은 무엇을 지원하나요?
    answer: 신용카드, 계좌이체, 간편결제(카카오페이, 네이버페이)를 지원합니다.
