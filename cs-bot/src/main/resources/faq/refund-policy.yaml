category: 환불정책
items:
  - question: 환불은 언제까지 가능한가요?
    answer: 구매 후 7일 이내, 미개봉 상품에 한해 환불이 가능합니다. 선착순 한정 상품은 재고 특성상 환불 후 재판매가 어려워 구매 후 3일 이내로 제한됩니다.
  - question: 환불 처리는 얼마나 걸리나요?
    answer: 환불 요청 접수 후 영업일 기준 3~5일 내 결제 수단으로 환불됩니다.
  - question: 부분 환불이 가능한가요?
    answer: 한 주문에 여러 상품이 포함된 경우 상품 단위로 부분 환불이 가능합니다. 단, 묶음 할인으로 구매한 상품은 전체 환불만 가능합니다.
  - question: 결제 후 단순 변심으로도 환불할 수 있나요?
    answer: 단순 변심도 환불 가능하나, 선착순 한정 상품은 재고 회전이 빨라 구매 후 3일 이내에만 변심 환불이 가능합니다.
