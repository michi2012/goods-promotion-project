server:
  port: 8088
  shutdown: graceful

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: "${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}"

spring:
  application:
    name: gateway-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGIN:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: serverB-orders
          uri: lb://serverB
          predicates:
            - Path=/api/v1/orders/**

        - id: serverB-goods-stock
          uri: lb://serverB
          predicates:
            - Path=/api/v1/goods/*/stock
            - Method=GET

        - id: serverA
          uri: lb://serverA
          predicates:
            - Path=/api/v1/promotions/**, /api/v1/goods/**, /api/v1/admin/**

        - id: serverC
          uri: lb://serverC
          predicates:
            - Path=/api/v1/payments/**

        - id: aiops
          uri: lb://aiops
          predicates:
            - Path=/webhook/**, /action/**

management:
  observations:
    enable:
      http:
        server:
          requests:
            "[uri=/actuator/**]": false
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

  endpoints:
    web:
      exposure:
        include: "health, prometheus"

  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

  tracing:
    sampling:
      probability: 0.01

  otlp:
    tracing:
      endpoint: "${OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}"