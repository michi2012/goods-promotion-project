name: promotion-ci-cd
on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [dev, main]
    paths:
      - '**/*'

jobs:
  test:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Give gradlew execute permission
        run: chmod +x ./gradlew
      - name: Build and run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;MODE=MySQL
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_REDIS_HOST: localhost
          NAVER_CLIENT_ID: test-client-id
        run: ./gradlew clean test

  set-environment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: set env
        id: set-env
        run: |
          echo "Target Branch: ${{ github.base_ref }}"
          echo "environment=dev" >> $GITHUB_OUTPUT
          if [[ ${{ github.base_ref }} == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          fi

  image-build:
    runs-on: ubuntu-latest
    needs: [set-environment]
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        environment: ["${{ needs.set-environment.outputs.environment }}"]
        service:
          - { module: discovery-service, repo: discovery-service }
          - { module: gateway-service,   repo: gateway-service }
          - { module: serverA,           repo: server-a }
          - { module: serverB,           repo: server-b }
          - { module: serverC,           repo: server-c }
          - { module: user-service,      repo: user-service }
          - { module: aiops,             repo: aiops }
          - { module: codebot,           repo: codebot }
          - { module: cs-bot,            repo: cs-bot }
    environment: ${{ matrix.environment }}
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'
      - name: docker build & push
        run: |
          docker build -f ${{ matrix.service.module }}/Dockerfile \
            --tag ${{ secrets.REGISTRY }}/${{ matrix.service.repo }}:${{ github.sha }} \
            ${{ matrix.service.module }}
          docker push ${{ secrets.REGISTRY }}/${{ matrix.service.repo }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [set-environment, image-build]
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        environment: ["${{ needs.set-environment.outputs.environment }}"]
    environment: ${{ matrix.environment }}
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      - name: setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest
      - name: setup helm
        uses: azure/setup-helm@v3
        with:
          version: v3.11.1
      - name: access kubernetes
        run: |
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME }}

      - name: deploy
        id: status
        run: |
          helm upgrade --install promotion-app ./helm/promotion-app \
          --create-namespace --namespace promotion \
          --set discovery.image=${{ secrets.REGISTRY }}/discovery-service:${{ github.sha }} \
          --set gateway.image=${{ secrets.REGISTRY }}/gateway-service:${{ github.sha }} \
          --set serverA.image=${{ secrets.REGISTRY }}/server-a:${{ github.sha }} \
          --set serverB.image=${{ secrets.REGISTRY }}/server-b:${{ github.sha }} \
          --set serverC.image=${{ secrets.REGISTRY }}/server-c:${{ github.sha }} \
          --set userService.image=${{ secrets.REGISTRY }}/user-service:${{ github.sha }} \
          --set aiops.image=${{ secrets.REGISTRY }}/aiops:${{ github.sha }} \
          --set codebot.image=${{ secrets.REGISTRY }}/codebot:${{ github.sha }} \
          --set csBot.image=${{ secrets.REGISTRY }}/cs-bot:${{ github.sha }} \
          --set serverA.datasource.url=${{ secrets.SERVER_A_DATASOURCE_URL }} \
          --set serverA.datasource.username=${{ secrets.SERVER_A_DATASOURCE_USERNAME }} \
          --set serverA.datasource.password=${{ secrets.SERVER_A_DATASOURCE_PASSWORD }} \
          --set serverA.redis.host=${{ vars.REDIS_A_HOST }} \
          --set serverB.redis.host=${{ vars.REDIS_B_HOST }} \
          --set serverC.datasource.url=${{ secrets.SERVER_C_DATASOURCE_URL }} \
          --set serverC.datasource.username=${{ secrets.SERVER_C_DATASOURCE_USERNAME }} \
          --set serverC.datasource.password=${{ secrets.SERVER_C_DATASOURCE_PASSWORD }} \
          --set userService.datasource.url=${{ secrets.USER_DATASOURCE_URL }} \
          --set userService.datasource.username=${{ secrets.USER_DATASOURCE_USERNAME }} \
          --set userService.datasource.password=${{ secrets.USER_DATASOURCE_PASSWORD }} \
          --set userService.jwtSecret=${{ secrets.JWT_SECRET }} \
          --set gateway.redis.host=${{ vars.REDIS_A_HOST }} \
          --set aiops.googleGenaiApiKey=${{ secrets.GOOGLE_GENAI_API_KEY }} \
          --set aiops.slackWebhookUrl=${{ secrets.SLACK_WEBHOOK_URL }} \
          --set aiops.slackBotToken=${{ secrets.SLACK_BOT_TOKEN }} \
          --set aiops.githubOwner=${{ vars.GITHUB_OWNER }} \
          --set aiops.githubRepo=${{ vars.GITHUB_REPO }} \
          --set codebot.githubOwner=${{ vars.GITHUB_OWNER }} \
          --set codebot.githubRepo=${{ vars.GITHUB_REPO }} \
          --set codebot.githubToken=${{ secrets.CODEBOT_GITHUB_TOKEN }} \
          --set codebot.aiApiKey=${{ secrets.CODEBOT_AI_API_KEY }} \
          --set codebot.linearApiKey=${{ secrets.LINEAR_API_KEY }} \
          --set codebot.linearTeamId=${{ vars.LINEAR_TEAM_ID }} \
          --set codebot.datasource.order.url=${{ secrets.SERVER_A_DATASOURCE_URL }} \
          --set codebot.datasource.order.username=${{ secrets.CODEBOT_ORDER_DB_USERNAME }} \
          --set codebot.datasource.order.password=${{ secrets.CODEBOT_ORDER_DB_PASSWORD }} \
          --set codebot.datasource.payment.url=${{ secrets.SERVER_C_DATASOURCE_URL }} \
          --set codebot.datasource.payment.username=${{ secrets.CODEBOT_PAYMENT_DB_USERNAME }} \
          --set codebot.datasource.payment.password=${{ secrets.CODEBOT_PAYMENT_DB_PASSWORD }} \
          --set codebot.datasource.user.url=${{ secrets.USER_DATASOURCE_URL }} \
          --set codebot.datasource.user.username=${{ secrets.CODEBOT_USER_DB_USERNAME }} \
          --set codebot.datasource.user.password=${{ secrets.CODEBOT_USER_DB_PASSWORD }} \
          --set csBot.aiApiKey=${{ secrets.CS_BOT_AI_API_KEY }} \
          --set csBot.linearApiKey=${{ secrets.LINEAR_API_KEY }} \
          --set csBot.linearTeamId=${{ vars.LINEAR_TEAM_ID }} \
          --set ingress.host=${{ vars.INGRESS_HOST }} \
          --set ingress.certificateArn=${{ secrets.CERTIFICATE_ARN }}

      # prod 배포 시 카나리 시작: CanaryRolloutScheduler가 10%→25%→50%→100% 자동 승급을 이어받음
      # 특정 서비스만 카나리로 배포할 경우 아래 step을 활성화하고 대상 서비스 지정
      # - name: canary start (prod only)
      #   if: matrix.environment == 'prod'
      #   run: |
      #     helm upgrade promotion-app ./helm/promotion-app --reuse-values \
      #     --set serverA.canary.enabled=true \
      #     --set serverA.canary.image=${{ secrets.REGISTRY }}/server-a:${{ github.sha }}

      - name: notify
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Promotion Service Deploy",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Promotion Service Deploy Result: ${{ steps.status.outcome }}\nEnvironment: ${{ matrix.environment }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  create-pr:
    if: needs.set-environment.outputs.environment == 'dev'
    runs-on: ubuntu-latest
    needs: [set-environment, deploy]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: gh auth login
        run: |
          echo ${{ secrets.PERSONAL_ACCESS_TOKEN }} | gh auth login --with-token
      - name: create branch
        run: |
          git checkout -b release/${{ github.run_id }}
          git push origin release/${{ github.run_id }}
      - name: create pr
        run: |
          gh pr create --base main --head release/${{ github.run_id }} --title "release/${{ github.run_id }} -> main" --body "Promotion Service Release PR"
